postgres:
  type: external
  username: app # match CNPG's app user
  geonode_databasename_and_username: geonode
  geodata_databasename_and_username: geodata

  external:
    hostname: cluster-pg-rw
    port: 5432
    ssl: prefer
    secret:
      # existingSecretName: "geonode-postgres-creds"
      # -- if not using an existing Secret, the operator will create a Secret with this name and the following keys
      postgres_password: vcebJmiGBeY62jTAmGV7zA7DjvkOpy7FnYuk1gf59ABqGThPSDRO8XIRAE8bxjwc
      geonode_password: geonode-secret
      geodata_password: geodata-secret

rabbitmq:
  requests:
    memory: "256Mi"
    cpu: "200m"
  limits:
    memory: "512Mi"
    cpu: "500m"
  enabled: True
  persistence:
    enabled: true
    size: 2Gi
  tolerations:
    - key: "cluster"
      operator: "Equal"
      value: "rheticuset_cluster"
      effect: "NoSchedule"

memcached:
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  config:
    memoryLimit: 96        # keep under the container limit (in MB)
  tolerations:
    - key: "cluster"
      operator: "Equal"
      value: "rheticuset_cluster"
      effect: "NoSchedule"